# ─────────────────────────────────────────────────────────────────────────────
# awx-local/docker-compose.yml
#
# Runs Ansible Semaphore locally on your Mac using Docker Compose.
#
# Semaphore is the actively maintained open-source Ansible UI.
# It replaces AWX here because the quay.io/ansible/awx image is built for
# Kubernetes (AWX Operator) and cannot run standalone in Docker Compose.
#
# Semaphore provides:
#   - The same concepts: job templates, inventories, credentials, projects
#   - A clean REST API that EC2 user_data.sh calls to trigger playbooks
#   - A web UI at http://localhost:3000
#   - Fast startup (~10 seconds vs 3-4 minutes for AWX)
#
# Usage:
#   cd awx-local
#   docker compose up -d          # start all services
#   docker compose logs -f        # watch logs
#   docker compose down           # stop (keeps data volumes)
#   docker compose down -v        # stop AND wipe all data
#
# Access Semaphore at: http://localhost:3000
# Default credentials: admin / changeme123
# ─────────────────────────────────────────────────────────────────────────────

services:

  semaphore:
    image: semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SEMAPHORE_DB_USER:     semaphore
      SEMAPHORE_DB_PASS:     semaphorepass
      SEMAPHORE_DB_HOST:     semaphore_db
      SEMAPHORE_DB_PORT:     5432
      SEMAPHORE_DB_DIALECT:  postgres
      SEMAPHORE_DB:          semaphore
      SEMAPHORE_PLAYBOOK_PATH: /tmp/semaphore/
      SEMAPHORE_ADMIN:          admin
      SEMAPHORE_ADMIN_NAME:     Admin
      SEMAPHORE_ADMIN_EMAIL:    admin@localhost
      SEMAPHORE_ADMIN_PASSWORD: changeme123
      # Required: random 32-char string used to encrypt stored secrets
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "gs72mPntFATGJs9qK0pQ0rKtfidlexiMjYvc"
    depends_on:
      semaphore_db:
        condition: service_healthy
    volumes:
      - semaphore_data:/home/semaphore
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  semaphore_db:
    image: postgres:15-alpine
    container_name: semaphore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       semaphore
      POSTGRES_USER:     semaphore
      POSTGRES_PASSWORD: semaphorepass
    volumes:
      - semaphore_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  semaphore_data:
    name: semaphore_data
  semaphore_pg:
    name: semaphore_pg_data
