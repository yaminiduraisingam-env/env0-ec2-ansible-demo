services:
  semaphore:
    build: .                      # Build from local Dockerfile (adds Ansible)
    container_name: semaphore
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SEMAPHORE_DB_USER:     semaphore
      SEMAPHORE_DB_PASS:     semaphorepass
      SEMAPHORE_DB_HOST:     semaphore_db
      SEMAPHORE_DB_PORT:     5432
      SEMAPHORE_DB_DIALECT:  postgres
      SEMAPHORE_DB:          semaphore
      SEMAPHORE_PLAYBOOK_PATH: /tmp/semaphore/
      SEMAPHORE_ADMIN:          admin
      SEMAPHORE_ADMIN_NAME:     Admin
      SEMAPHORE_ADMIN_EMAIL:    admin@localhost
      SEMAPHORE_ADMIN_PASSWORD: changeme123
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "gs72mPntFATGJs9qK0pQ0rKtfidlexiMjYvc"
    depends_on:
      semaphore_db:
        condition: service_healthy
    volumes:
      - semaphore_data:/home/semaphore

  semaphore_db:
    image: postgres:15-alpine
    container_name: semaphore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       semaphore
      POSTGRES_USER:     semaphore
      POSTGRES_PASSWORD: semaphorepass
    volumes:
      - semaphore_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semaphore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  semaphore_data:
  semaphore_pg:
