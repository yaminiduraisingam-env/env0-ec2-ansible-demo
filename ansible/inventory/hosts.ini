# ─────────────────────────────────────────────────────────────────────────────
# ansible/inventory/hosts.ini
#
# This file is a STATIC placeholder inventory.
# In practice, the actual target host (EC2 IP) is passed to AWX at job
# launch time via the extra_vars payload from user_data.sh:
#
#   "extra_vars": { "target_host": "1.2.3.4" }
#
# And the playbook uses: hosts: "{{ target_host }}"
# AWX evaluates this at runtime using the dynamic inventory below.
#
# You ALSO need to create a "Smart Inventory" or "Constructed Inventory"
# in AWX, OR simply use the "localhost" inventory and rely on extra_vars
# to define the target. See Part 8 of the guide.
# ─────────────────────────────────────────────────────────────────────────────

[all]
# Hosts are injected dynamically via AWX extra_vars at job launch time.
# This file is required by Ansible but the actual target IP comes from
# the EC2 bootstrap script calling: POST /api/v2/job_templates/{id}/launch/

[webservers]
# Populated dynamically at runtime

[local]
localhost ansible_connection=local
