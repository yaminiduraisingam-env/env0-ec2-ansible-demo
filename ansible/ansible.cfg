# ─────────────────────────────────────────────────────────────────────────────
# ansible/ansible.cfg
#
# Ansible configuration file. Settings here apply to all ansible-playbook
# commands run from this directory (or subdirectories).
#
# AWX reads this file when the project is synced from GitHub.
# ─────────────────────────────────────────────────────────────────────────────

[defaults]
# Default inventory file (used for local testing; AWX overrides this)
inventory              = inventory/hosts.ini

# Where to find roles
roles_path             = roles/

# Where to find Galaxy collections
collections_paths      = ~/.ansible/collections:/usr/share/ansible/collections

# Don't prompt to add new SSH host keys — needed for fresh EC2 instances
host_key_checking      = False

# Show a diff when files are changed (very helpful for debugging)
diff_always            = True

# Retry file location
retry_files_enabled    = False

# Log file (useful when running locally)
# log_path             = /tmp/ansible.log

# Default remote user for EC2 Ubuntu instances
remote_user            = ubuntu

# Timeout for SSH connections
timeout                = 30

# Increase output verbosity (0=minimal, 4=debug)
verbosity              = 1

[ssh_connection]
# Reuse SSH connections across tasks (much faster)
pipelining             = True
ssh_args               = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[privilege_escalation]
# Use sudo for privilege escalation (become: true in playbooks)
become                 = True
become_method          = sudo
become_user            = root
become_ask_pass        = False
